name: CD

on:
  push:
    branches: [master]

jobs:
    # Job 1: Kiem tra code
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm test

    # Job 2: Build Docker image va push len Docker Hub
  push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    # Job 3: Trien khai len may chu EC2
  deploy:
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest
            docker stop app || true
            docker rm app || true
            docker run -d --name app -p 3000:3000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/goldenowl-app:latest
